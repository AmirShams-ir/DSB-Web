<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSB - Digital Seed Backup</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🗝️ Digital Seed Phrase Backup</h1>

    <div class="card">

        <h2>🔒 Encrypt Seed Phrase</h2>

        <div id="seed-grid"></div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm-password">
        </div>

        <button id="encrypt-btn">
            Encrypt & Download
        </button>

    </div>

    <div class="card">

        <h2>🔓 Decrypt Backup</h2>

        <input type="file" id="backup-file">

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="decrypt-password">
        </div>

        <button id="decrypt-btn">
            Decrypt
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/argon2-browser/dist/argon2-bundled.min.js"></script>
<script src="crypto.js"></script>
<script src="app.js"></script>

</body>
</html>
